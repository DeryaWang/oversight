services:
  oversight-postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-oversight}
      - POSTGRES_USER=${POSTGRES_USER:-oversight}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-oversight123}
    volumes:
      - oversight-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oversight} -d ${POSTGRES_DB:-oversight}"]
      interval: 10s
      timeout: 5s
      retries: 10

  oversight-backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: oversight-backend
    ports:
      - "5001:5001"
    environment:
      - FLASK_PORT=5001
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://oversight:oversight123@oversight-postgres:5432/oversight
      - CORS_ORIGINS=http://localhost:3000,http://oversight-frontend:3000
      - QUERY_DECOMPOSITION_AGENT_MODE=${QUERY_DECOMPOSITION_AGENT_MODE}
      - LOCAL_AGENT_ENABLED=${LOCAL_AGENT_ENABLED}
      - LOCAL_AGENT_DEBUG=${LOCAL_AGENT_DEBUG}
      - API_URL=${API_URL}
      - API_KEY=${API_KEY}
      - REMOTE_AGENT_LLM_MODEL=${REMOTE_AGENT_LLM_MODEL}
      - REMOTE_AGENT_LLM_TIMEOUT_SECONDS=${REMOTE_AGENT_LLM_TIMEOUT_SECONDS}
    volumes:
      - ./prompts:/app/prompts:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5001/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      oversight-postgres:
        condition: service_healthy

  oversight-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=http://oversight-backend:5001
    image: oversight-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://oversight-backend:5001
    depends_on:
      - oversight-backend

networks:
  default:
    name: oversight-network

volumes:
  oversight-postgres-data:
